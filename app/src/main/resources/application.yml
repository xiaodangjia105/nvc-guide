# NVC 非暴力沟通练习助手配置

logging:
  charset:
    console: UTF-8
    file: UTF-8

server:
  port: 8080
  # 明确指定HTTP响应编码
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# SpringDoc OpenAPI / Swagger配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  packages-to-scan: nvc.guide.modules

spring:
  config:
    import: optional:classpath:voice-interview-opening.yml
  application:
    name: nvc-guide

  # 启用虚拟线程 (Java 21+)
  # 显著提升 I/O 密集型场景的并发能力，特别适合 AI 调用和 SSE 长连接
  threads:
    virtual:
      enabled: true

  # PostgreSQL数据库配置
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:10.237.255.9}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nvc_practice}
    username: ${POSTGRES_USER:nvc}
    password: ${POSTGRES_PASSWORD:nvc123}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update #首次启动用 create，表创建成功后，改回 update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never
      data-locations:
        - classpath:data-nvc-agent-config.sql
        - classpath:data-nvc-scenario.sql

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB  # 支持知识库上传（简历限制在业务层检查）
      max-request-size: 50MB
  

  # Redisson配置 (使用 spring.redis.redisson，参考官方文档)
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:10.237.255.9}:${REDIS_PORT:6379}"
          database: ${REDIS_DATABASE:2}
          connectionMinimumIdleSize: 10
          connectionPoolSize: 64
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50
  
  # Spring AI 配置（chat + embedding 统一由 app.ai.providers 驱动，不使用自动配置）
  ai:
    # 禁用自动重试机制，让异常立即返回
    retry:
      max-attempts: 1  # 不重试，失败立即返回
      on-client-errors: false
    # PostgreSQL Vector Store配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024  # text-embedding-v3实际生成的向量维度
        initialize-schema: true # 开发环境设置为 true，方便快速启动。生产环境设置为 false，手动管理数据库 schema，避免意外变更。
        remove-existing-vector-store-table: false  # 保留现有表和数据

# Application custom configuration
app:
  ai:
    default-provider: ${APP_AI_DEFAULT_PROVIDER:mimo}
    default-embedding-provider: dashscope
    embedding-dimensions: ${APP_AI_EMBEDDING_DIMENSIONS:1024}
    security:
      api-key-encryption-key: ${APP_AI_CONFIG_ENCRYPTION_KEY:}
      require-encryption-key: ${APP_AI_CONFIG_REQUIRE_ENCRYPTION_KEY:false}
    # 运行时可写的 Provider 配置落点（与 classpath 主 application.yml 隔离）。
    # 开发环境默认写到用户主目录下，避免污染源码目录或 jar 内 classpath 资源。
    config-yaml-path: ${APP_AI_CONFIG_YAML_PATH:${user.home}/.nvc-guide/llm-providers.yml}
    config-env-path: ${APP_AI_CONFIG_ENV_PATH:${user.home}/.nvc-guide/llm-providers.env}
    agent-utils:
      skills-root: ${APP_AI_AGENT_UTILS_SKILLS_ROOT:classpath:skills}
    providers:
      dashscope:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${AI_BAILIAN_API_KEY}
        model: ${AI_MODEL:qwen3.5-flash}
        embedding-model: text-embedding-v3
        embedding-dimensions: 1024
        supports-embedding: true
      lmstudio:
        base-url: http://localhost:1234
        api-key: ${PROVIDER_LMSTUDIO_API_KEY:lm-studio}
        model: qwen2.5-7b-instruct
        supports-embedding: false
      # ===== 预设 Provider（填完 API Key 后即可使用）=====
      # Moonshot AI / Kimi（OpenAI 兼容） https://platform.moonshot.cn/
      kimi:
        base-url: https://api.moonshot.cn/v1
        api-key: ${PROVIDER_KIMI_API_KEY:}
        model: ${PROVIDER_KIMI_MODEL:kimi-latest}
        temperature: 1
        supports-embedding: false
      # DeepSeek（OpenAI 兼容） https://api-docs.deepseek.com/
      deepseek:
        base-url: https://api.deepseek.com
        api-key: ${PROVIDER_DEEPSEEK_API_KEY:}
        model: ${PROVIDER_DEEPSEEK_MODEL:deepseek-v4-flash}
        supports-embedding: false
      # 智谱 AI / GLM（OpenAI 兼容） https://open.bigmodel.cn/
      glm:
        base-url: https://open.bigmodel.cn/api/coding/paas/v4
        api-key: ${PROVIDER_GLM_API_KEY:}
        model: ${PROVIDER_GLM_MODEL:glm-5}
        embedding-model: embedding-3
        embedding-dimensions: 1024
        supports-embedding: true
      # 小米 MiMo（OpenAI 兼容）
      mimo:
        base-url: https://api.xiaomimimo.com/v1
        api-key: ${PROVIDER_MIMO_API_KEY:sk-cqtgohrrudni9hrhlqun888fx9m8k2ulpqy5itgp6pahymph}
        model: ${PROVIDER_MIMO_MODEL:mimo-v2.5}
        supports-embedding: false
    advisors:
      enabled: ${APP_AI_ADVISORS_ENABLED:true}
      tool-call-enabled: ${APP_AI_ADVISORS_TOOL_CALL_ENABLED:true}
      tool-call-conversation-history-enabled: ${APP_AI_ADVISORS_TOOL_CALL_CONVERSATION_HISTORY_ENABLED:false}
      stream-tool-call-responses: ${APP_AI_ADVISORS_STREAM_TOOL_CALL_RESPONSES:false}
      message-chat-memory-enabled: ${APP_AI_ADVISORS_MESSAGE_CHAT_MEMORY_ENABLED:false}
      message-chat-memory-max-messages: ${APP_AI_ADVISORS_MESSAGE_CHAT_MEMORY_MAX_MESSAGES:120}
      simple-logger-enabled: ${APP_AI_ADVISORS_SIMPLE_LOGGER_ENABLED:false}
    # 结构化输出重试次数（用于 BeanOutputConverter 解析失败时的业务层重试）
    structured-max-attempts: ${APP_AI_STRUCTURED_MAX_ATTEMPTS:2}
    # 重试时是否将上次错误原因注入提示词，帮助模型定向修复输出
    structured-include-last-error: ${APP_AI_STRUCTURED_INCLUDE_LAST_ERROR:true}
    # 是否启用“修复型重试提示词”（关闭后每次重试沿用原始 system prompt）
    structured-retry-use-repair-prompt: ${APP_AI_STRUCTURED_RETRY_USE_REPAIR_PROMPT:true}
    # 修复型重试提示词中是否追加严格 JSON 指令
    structured-retry-append-strict-json-instruction: ${APP_AI_STRUCTURED_RETRY_APPEND_STRICT_JSON_INSTRUCTION:true}
    # 注入到重试提示词中的错误信息最大长度
    structured-error-message-max-length: ${APP_AI_STRUCTURED_ERROR_MESSAGE_MAX_LENGTH:200}
    # 是否开启结构化输出调用指标（invocations/attempts/latency）
    structured-metrics-enabled: ${APP_AI_STRUCTURED_METRICS_ENABLED:true}
    rag:
      rewrite:
        enabled: ${APP_AI_RAG_REWRITE_ENABLED:true}
      search:
        short-query-length: ${APP_AI_RAG_SHORT_QUERY_LENGTH:4}
        topk-short: ${APP_AI_RAG_TOPK_SHORT:20}
        topk-medium: ${APP_AI_RAG_TOPK_MEDIUM:12}
        topk-long: ${APP_AI_RAG_TOPK_LONG:8}
        min-score-short: ${APP_AI_RAG_MIN_SCORE_SHORT:0.18}
        min-score-default: ${APP_AI_RAG_MIN_SCORE_DEFAULT:0.28}

  # RustFS (S3兼容) 存储配置
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT:http://10.237.255.9:9000}
    access-key: ${APP_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${APP_STORAGE_SECRET_KEY:minioadmin}
    bucket: ${APP_STORAGE_BUCKET:nvc-guide}
    region: ${APP_STORAGE_REGION:us-east-1}
  
  # CORS配置 - React前端
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:80}

  # Voice interview configuration
  voice-interview:
    # Phase duration settings (minutes)
    phase:
      intro:
        min-duration: ${APP_VOICE_INTERVIEW_PHASE_INTRO_MIN_DURATION:3}
        suggested-duration: ${APP_VOICE_INTERVIEW_PHASE_INTRO_SUGGESTED_DURATION:5}
        max-duration: ${APP_VOICE_INTERVIEW_PHASE_INTRO_MAX_DURATION:8}
        min-questions: ${APP_VOICE_INTERVIEW_PHASE_INTRO_MIN_QUESTIONS:2}
        max-questions: ${APP_VOICE_INTERVIEW_PHASE_INTRO_MAX_QUESTIONS:5}
      tech:
        min-duration: ${APP_VOICE_INTERVIEW_PHASE_TECH_MIN_DURATION:8}
        suggested-duration: ${APP_VOICE_INTERVIEW_PHASE_TECH_SUGGESTED_DURATION:10}
        max-duration: ${APP_VOICE_INTERVIEW_PHASE_TECH_MAX_DURATION:15}
        min-questions: ${APP_VOICE_INTERVIEW_PHASE_TECH_MIN_QUESTIONS:3}
        max-questions: ${APP_VOICE_INTERVIEW_PHASE_TECH_MAX_QUESTIONS:8}
      project:
        min-duration: ${APP_VOICE_INTERVIEW_PHASE_PROJECT_MIN_DURATION:8}
        suggested-duration: ${APP_VOICE_INTERVIEW_PHASE_PROJECT_SUGGESTED_DURATION:10}
        max-duration: ${APP_VOICE_INTERVIEW_PHASE_PROJECT_MAX_DURATION:15}
        min-questions: ${APP_VOICE_INTERVIEW_PHASE_PROJECT_MIN_QUESTIONS:2}
        max-questions: ${APP_VOICE_INTERVIEW_PHASE_PROJECT_MAX_QUESTIONS:5}
      hr:
        min-duration: ${APP_VOICE_INTERVIEW_PHASE_HR_MIN_DURATION:3}
        suggested-duration: ${APP_VOICE_INTERVIEW_PHASE_HR_SUGGESTED_DURATION:5}
        max-duration: ${APP_VOICE_INTERVIEW_PHASE_HR_MAX_DURATION:8}
        min-questions: ${APP_VOICE_INTERVIEW_PHASE_HR_MIN_QUESTIONS:2}
        max-questions: ${APP_VOICE_INTERVIEW_PHASE_HR_MAX_QUESTIONS:5}

    # TTS configuration
    tts:
      default-voice: ${APP_VOICE_INTERVIEW_TTS_DEFAULT_VOICE:siyue}  # 思悦 - 温柔自然的女声

    # Qwen3 Realtime ASR Configuration
    qwen:
      asr:
        url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
        model: qwen3-asr-flash-realtime
        api-key: ${AI_BAILIAN_API_KEY}
        language: zh
        format: pcm
        sample-rate: 16000
        enable-turn-detection: true
        turn-detection-type: server_vad
        turn-detection-threshold: 0.0
        # 静音多久判为一句结束；中文面试思考停顿常见 2-3s，设 2000 避免句中切段
        turn-detection-silence-duration-ms: ${APP_VOICE_ASR_SILENCE_MS:2000}

      # Qwen TTS Realtime Configuration (WebSocket-based)
      # 音色列表文档：https://help.aliyun.com/zh/model-studio/qwen-tts-realtime
      tts:
        model: qwen3-tts-flash-realtime
        api-key: ${AI_BAILIAN_API_KEY}
        voice: Cherry
        format: pcm
        sample-rate: 24000
        mode: commit
        language-type: Chinese
        speech-rate: 1.0
        volume: 60

    # 用户说完一小段 STT 定稿后，再等多久（毫秒）才触发面试官回复；需大于 VAD 静音阈值以确保用户继续说话时 partials 能取消
    user-utterance-debounce-ms: ${APP_VOICE_USER_UTTERANCE_DEBOUNCE_MS:2500}
    # 触发提交前要求的最小静音时长（毫秒），从最后一次 STT 活动（含 partial）算起
    min-silence-before-commit-ms: ${APP_VOICE_MIN_SILENCE_BEFORE_COMMIT_MS:2500}
    # 当内容较短时先不提交，等待继续说（字符数）
    min-commit-chars: ${APP_VOICE_MIN_COMMIT_CHARS:20}
    # 最长等待用户继续补充的时间（毫秒），超时后强制提交
    max-wait-for-continuation-ms: ${APP_VOICE_MAX_WAIT_FOR_CONTINUATION_MS:7000}
    # 语音面试单轮面试官回复最大长度（字符）
    ai-question-max-chars: ${APP_VOICE_AI_QUESTION_MAX_CHARS:120}
    # 是否按句子边合成边推送语音；开启后首段语音不用等待完整回复生成结束
    chunked-audio-enabled: ${APP_VOICE_CHUNKED_AUDIO_ENABLED:true}
    # 单句 TTS 合成超时，避免某一句卡住整轮播放
    tts-timeout-seconds: ${APP_VOICE_TTS_TIMEOUT_SECONDS:8}
    # 单会话并发 TTS 上限，控制首段语音速度和服务连接压力
    max-concurrent-tts-per-session: ${APP_VOICE_MAX_CONCURRENT_TTS_PER_SESSION:3}

    # Rate limiting
    rate-limit:
      max-per-session: ${APP_VOICE_INTERVIEW_RATE_LIMIT_MAX_PER_SESSION:10}  # messages per second
      max-per-ip: ${APP_VOICE_INTERVIEW_RATE_LIMIT_MAX_PER_IP:3}  # interviews per hour
      max-concurrent: ${APP_VOICE_INTERVIEW_RATE_LIMIT_MAX_CONCURRENT:50}  # global concurrent interviews

    # Audio specifications
    audio:
      codec: ${APP_VOICE_INTERVIEW_AUDIO_CODEC:opus}
      sample-rate: ${APP_VOICE_INTERVIEW_AUDIO_SAMPLE_RATE:16000}
      bit-rate: ${APP_VOICE_INTERVIEW_AUDIO_BIT_RATE:24000}
      channels: ${APP_VOICE_INTERVIEW_AUDIO_CHANNELS:1}
      chunk-duration: ${APP_VOICE_INTERVIEW_AUDIO_CHUNK_DURATION:2000}  # 2 seconds
